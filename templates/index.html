<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOB 量化系统 V3.0 - 模拟盘实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .update-time {
            color: #666;
            font-size: 14px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }

        .refresh-btn:hover {
            background: #5a6fd6;
        }

        /* Assets Overview - 5 cards in 1 row on PC, 2-3 on mobile */
        .assets-overview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .asset-card {
            background: white;
            padding: 16px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .asset-card h3 {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .asset-card .value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .asset-card .profit {
            font-size: 13px;
            margin-top: 4px;
        }

        .profit-positive {
            color: #e74c3c;
        }

        .profit-negative {
            color: #27ae60;
        }

        /* Main Content Area */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* Section Cards */
        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .section-card h2 {
            color: #667eea;
            font-size: 16px;
            padding: 14px 16px;
            border-bottom: 2px solid #f0f0f0;
            margin: 0;
            font-weight: 600;
        }

        /* Content Containers */
        .positions-section, .trades-section {
            padding: 16px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }

        /* Mobile Layout */
        @media (max-width: 1024px) {
            .assets-overview {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .assets-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* PC Only / Mobile Only */
        .pc-only { display: block; }
        .mobile-only { display: none; }

        @media (max-width: 1024px) {
            .pc-only { display: none; }
            .mobile-only { display: block; }
        }

        /* Stock Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border-radius: 12px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #000;
        }

        .modal-header h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stock-detail-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .stock-detail-info {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .detail-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .detail-card h4 {
            color: #666;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .detail-card .value {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
        }

        .back-btn:active {
            background: #3f51b5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 BOB 量化系统 V3.0</h1>
            <p class="update-time">
                <span id="updateTime">--</span>
                <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
            </p>
        </div>

        <div class="assets-overview">
            <div class="asset-card">
                <h3>💰 总资产</h3>
                <div class="value" id="totalAssets">--</div>
                <div class="profit" id="totalProfit">--</div>
            </div>
            <div class="asset-card">
                <h3>📈 证券市值</h3>
                <div class="value" id="marketValue">--</div>
            </div>
            <div class="asset-card">
                <h3>💵 可用现金</h3>
                <div class="value" id="cash">--</div>
            </div>
            <div class="asset-card">
                <h3>📊 持仓盈亏</h3>
                <div class="value" id="positionProfit">--</div>
            </div>
            <div class="asset-card">
                <h3>📉 当日盈亏</h3>
                <div class="value" id="todayProfit">--</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="section-card">
                <h2>📋 持仓明细</h2>
                <div class="positions-section">
                    <div id="pcPositionsContent">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2>📝 交易记录</h2>
                <div class="trades-section">
                    <div id="tradesContent">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stock Detail Modal -->
    <div id="stockModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">股票详情</h2>
            </div>
            <div id="modalBody" class="stock-detail-info">
                <div class="loading">加载中...</div>
            </div>
            <button class="back-btn" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        // Format money
        function formatMoney(amount) {
            if (amount === null || amount === undefined) return '--';
            return '¥' + amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Format percent
        function formatPercent(value) {
            if (value === null || value === undefined) return '--';
            return (value * 100).toFixed(2) + '%';
        }

        // Price comparison class
        function getPriceClass(currentPrice, avgPrice) {
            if (currentPrice > avgPrice) return 'profit-positive';
            if (currentPrice < avgPrice) return 'profit-negative';
            return '';
        }

        // Load account data
        async function loadData() {
            try {
                const response = await fetch('/api/account?_=' + new Date().getTime());
                const data = await response.json();
                
                if (data.error) {
                    console.error(data.error);
                    document.getElementById('updateTime').textContent = '加载失败';
                    return;
                }

                // Update assets
                document.getElementById('totalAssets').textContent = formatMoney(data.total_assets);
                document.getElementById('marketValue').textContent = formatMoney(data.market_value);
                document.getElementById('cash').textContent = formatMoney(data.cash);
                
                const positionProfit = data.profit;
                const positionProfitText = positionProfit >= 0 ? '+' : '';
                const positionProfitClass = positionProfit >= 0 ? 'profit-positive' : 'profit-negative';
                document.getElementById('positionProfit').innerHTML = 
                    `<span class="${positionProfitClass}">${positionProfitText}${formatMoney(positionProfit)}</span>`;
                
                const todayProfit = data.profit_today;
                const todayProfitText = todayProfit >= 0 ? '+' : '';
                const todayProfitClass = todayProfit >= 0 ? 'profit-positive' : 'profit-negative';
                document.getElementById('todayProfit').innerHTML = 
                    `<span class="${todayProfitClass}">${todayProfitText}${formatMoney(todayProfit)}</span>`;
                
                document.getElementById('totalProfit').innerHTML = 
                    `<span class="${positionProfitClass}">${positionProfitText}${formatMoney(data.profit)}</span>`;

                // Update time
                const now = new Date();
                const timeStr = now.getFullYear() + '-' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(now.getDate()).padStart(2, '0') + ' ' + 
                               String(now.getHours()).padStart(2, '0') + ':' + 
                               String(now.getMinutes()).padStart(2, '0') + ':' + 
                               String(now.getSeconds()).padStart(2, '0');
                document.getElementById('updateTime').textContent = timeStr;

                // Load positions and trades
                loadPositions();
                loadTrades();
            } catch (error) {
                console.error('Error loading account data:', error);
                document.getElementById('updateTime').textContent = '加载失败';
            }
        }

        // Load positions
        async function loadPositions() {
            try {
                const response = await fetch('/api/positions?_=' + new Date().getTime());
                const data = await response.json();
                
                if (data.error) {
                    console.error(data.error);
                    return;
                }

                if (!data.positions || data.positions.length === 0) {
                    document.getElementById('pcPositionsContent').innerHTML = '<p style="text-align:center;color:#999;padding:40px">暂无持仓</p>';
                    return;
                }

                let html = '<div class="positions-grid">';
                data.positions.forEach(pos => {
                    const profitClass = pos.profit >= 0 ? 'profit-positive' : 'profit-negative';
                    const profitText = pos.profit >= 0 ? '+' : '';
                    const priceClass = getPriceClass(pos.current_price, pos.avg_price);
                    const totalShares = pos.shares;
                    const tradableShares = totalShares - (pos.today_bought || 0);
                    
                    html += `
                        <div class="position-card ${profitClass}">
                            <div class="position-header">
                                <div class="stock-info">
                                    <a href="http://guba.eastmoney.com/list,${pos.code.replace('.', '')}.html" target="_blank" class="stock-name-link">${pos.name}</a>
                                    <span class="stock-code">${pos.code}</span>
                                </div>
                            </div>
                            <div class="position-body">
                                <div class="stat-item">
                                    <span class="label">持仓</span>
                                    <span class="value">${totalShares}</span>
                                    <span class="label">可交易</span>
                                    <span class="value">${tradableShares}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="label">现价</span>
                                    <span class="value ${priceClass}">${pos.current_price.toFixed(2)}</span>
                                    <span class="label">成本</span>
                                    <span class="value">${pos.avg_price.toFixed(2)}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="label">盈亏</span>
                                    <span class="value ${profitClass}">${profitText}${formatMoney(pos.profit)}</span>
                                    <span class="label">盈亏%</span>
                                    <span class="value ${profitClass}">${formatPercent(pos.profit_pct)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('pcPositionsContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading positions:', error);
            }
        }

        // Load trades
        async function loadTrades() {
            try {
                const response = await fetch('/api/trades?_=' + new Date().getTime());
                const data = await response.json();
                
                if (data.error) {
                    console.error(data.error);
                    return;
                }

                if (!data.trades || data.trades.length === 0) {
                    document.getElementById('tradesContent').innerHTML = '<p style="text-align:center;color:#999;padding:40px">暂无交易记录</p>';
                    return;
                }

                let html = '<div class="trades-list">';
                data.trades.slice(-20).reverse().forEach(trade => {
                    const actionClass = trade.action === '买入' ? 'profit-positive' : 'profit-negative';
                    let timeStr = trade.time || '--';
                    let dateStr = timeStr;
                    let timeOnly = '';
                    
                    if (timeStr.includes(' ')) {
                        const parts = timeStr.split(' ');
                        dateStr = parts[0];
                        timeOnly = parts[1];
                        if (timeOnly.length >= 5) {
                            timeOnly = timeOnly.substring(0, 5);
                        }
                    }
                    
                    html += `
                        <div class="trade-item">
                            <div class="trade-time">
                                <span class="date">${dateStr}</span>
                                <span class="time">${timeOnly}</span>
                            </div>
                            <div class="trade-info">
                                <span class="stock-name">${trade.name}</span>
                                <span class="action ${actionClass}">${trade.action}</span>
                            </div>
                            <div class="trade-details">
                                <span>${trade.shares}股</span>
                                <span class="price">¥${trade.price.toFixed(2)}</span>
                                <span class="amount">¥${(trade.shares * trade.price).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('tradesContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading trades:', error);
            }
        }

        // Show stock detail
        function showStockDetail(code) {
            document.getElementById('stockModal').style.display = 'block';
            document.getElementById('modalTitle').textContent = code + ' 股票详情';
            document.getElementById('modalBody').innerHTML = '<div class="loading">加载中...</div>';
            
            fetch('/api/stock/' + code + '?_=' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('modalBody').innerHTML = `<div class="loading">加载失败: ${data.error}</div>`;
                        return;
                    }
                    
                    let html = `
                        <div class="detail-card">
                            <h4>股票代码</h4>
                            <div class="value">${data.code}</div>
                        </div>
                        <div class="detail-card">
                            <h4>股票名称</h4>
                            <div class="value">${data.name}</div>
                        </div>
                        <div class="detail-card">
                            <h4>当前价</h4>
                            <div class="value">${data.current_price.toFixed(2)}</div>
                        </div>
                        <div class="detail-card">
                            <h4>涨跌幅</h4>
                            <div class="value">${formatPercent(data.change_pct)}</div>
                        </div>
                        <div class="detail-card">
                            <h4>昨收价</h4>
                            <div class="value">${data.prev_close.toFixed(2)}</div>
                        </div>
                        <div class="detail-card">
                            <h4>今开价</h4>
                            <div class="value">${data.open.toFixed(2)}</div>
                        </div>
                    `;
                    document.getElementById('modalBody').innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading stock detail:', error);
                    document.getElementById('modalBody').innerHTML = '<div class="loading">加载失败</div>';
                });
        }

        // Close modal
        function closeModal() {
            document.getElementById('stockModal').style.display = 'none';
        }

        // Auto refresh
        let autoRefreshInterval;
        function startAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            
            loadData();
            
            autoRefreshInterval = setInterval(() => {
                loadData();
            }, 60000); // 每60秒刷新一次
        }

        // Check trading time
        function isTradingTime() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const time = hour * 100 + minute;
            
            // 早盘: 09:25 - 11:35
            // 午盘: 12:55 - 15:05
            return (time >= 925 && time <= 1135) || (time >= 1255 && time <= 1505);
        }

        // Initialize
        window.onload = function() {
            startAutoRefresh();
        };
    </script>
</body>
</html>
