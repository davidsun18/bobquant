# ==========================================
# BobQuant 量化交易系统 - 全局配置 v1.0
# ==========================================

# --- 系统 ---
system:
  name: "BobQuant 模拟盘"
  version: "2.2.0"                 # v2.2: 完整版 (ML+ 情绪 + 并行 + 风控)
  log_level: "INFO"                # DEBUG / INFO / WARNING / ERROR
  check_interval: 10               # 行情检查间隔（秒）v2.2 优化至 10 秒

# --- 账户 ---
account:
  initial_capital: 1000000         # 初始资金 100万
  commission_rate: 0.0005          # 手续费万分之五
  stamp_duty_rate: 0.001           # 印花税千分之一（卖出时收取）
  max_stocks: 20                   # 最大持仓数量
  max_position_pct: 0.08           # 单只股票最大仓位比例

# --- 数据源 ---
data:
  primary: "tencent"               # 主数据源: tencent / infoway / tushare
  fallback: "tencent"              # 备用数据源
  history_provider: "baostock"     # 历史数据: baostock / tushare
  history_days: 60                 # 默认获取60天历史数据

  tencent:
    enabled: true
    retry: 2
    timeout: 3

  infoway:
    enabled: false
    api_key: ""
    websocket_url: "wss://data.infoway.io/ws"
    business: "stock"

  tushare:
    enabled: false
    token: ""

# --- 策略 ---
strategy:
  # 金字塔加仓
  pyramid_levels: [0.03, 0.05, 0.07]
  add_dip_pct: 0.03

  # 分批止盈
  take_profit:
    - pct: 0.05
      sell_ratio: 0.33
    - pct: 0.10
      sell_ratio: 0.50
    - pct: 0.15
      sell_ratio: 1.00

  # 止损
  stop_loss_pct: -0.08

  # 跟踪止损
  trailing_stop:
    activate_pct: 0.05
    drawdown_pct: 0.02

  # 网格做T
  grid_t:
    grid_up: 0.02
    grid_step: 0.015
    grid_max: 3
    buyback_dip: 0.01
    sell_ratio: 0.20

  # 信号过滤
  signal:
    rsi_buy_max: 35
    rsi_sell_min: 70
    volume_confirm: true
    volume_ratio_buy: 1.5
    
    # v2.0 新增：双 MACD 配置
    use_dual_macd: true  # 启用双 MACD 过滤
    dual_macd_short: [6, 13, 5]    # 短周期 (fast, slow, signal)
    dual_macd_long: [24, 52, 18]   # 长周期 (fast, slow, signal)
    
    # v2.0 新增：动态布林带配置
    use_dynamic_bollinger: true  # 启用动态标准差
    bollinger_window: 20
    bollinger_std_base: 2.0
    bollinger_std_high: 2.5   # 高波动股标准差
    bollinger_std_low: 1.8    # 低波动股标准差

# --- v2.0 风险管理 (NEW) ---
risk_management:
  # 风险过滤器
  filters:
    enabled: true
    min_turnover: 50000000      # 最小日均成交额 5000 万
    max_high_gain: 1.0          # 最大涨幅 100%（60 日内）
    high_gain_period: 60        # 涨幅统计周期
  
  # 大盘风控
  market_risk:
    enabled: true
    ma20_line: 20               # 20 日均线
    max_position_bear: 0.5      # 熊市最大仓位 50%
    crash_threshold: -0.03      # 暴跌阈值 -3%

# --- 智能增强 (v1.0 NEW) ---
ml:
  enabled: true                    # 启用 ML 预测
  lookback_days: 200               # 历史数据回溯天数
  min_train_samples: 60            # 最小训练样本数
  probability_threshold: 0.6       # 预测概率阈值（低于此值不交易）
  model_dir: "ml/models"           # 模型保存目录
  signal_weight: 0.4               # ML 信号权重

sentiment:
  enabled: true                    # 启用情绪指数
  high_threshold: 70               # 情绪高涨阈值
  low_threshold: 30                # 情绪低迷阈值
  signal_weight: 0.4               # 情绪信号权重
  
  # 仓位控制
  position:
    base: 60                       # 基础仓位%
    min: 30                        # 最小仓位%
    max: 90                        # 最大仓位%

# --- 通知 ---
notify:
  feishu:
    enabled: true
    user_id: "ou_973651ccbc692b7cd90a7d561f6885b3"

# --- 券商（未来实盘） ---
broker:
  mode: "simulator"                # simulator / easytrader / miniqmt
  easytrader:
    client: "ths"                  # ths / xq (同花顺/雪球)
    account: ""
  miniqmt:
    account: ""
    path: ""

# --- 交易时段 ---
trading_hours:
  morning_start: "09:25"
  morning_end: "11:35"
  afternoon_start: "12:55"
  afternoon_end: "15:05"
