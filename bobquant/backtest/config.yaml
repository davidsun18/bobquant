# ==========================================
# BobQuant 回测配置 v2.0
# ==========================================

# --- 回测时间段 ---
# Emily 建议的关键回测期
backtest_periods:
  # 完整牛熊周期验证
  full_cycle:
    start: "2024-01-01"
    end: "2024-12-31"
    description: "完整年度回测"
  
  # 近期行情验证
  recent:
    start: "2025-09-01"
    end: "2025-11-30"
    description: "近期市场验证"
  
  # 长期回测（3 年）
  long_term:
    start: "2023-01-01"
    end: "2025-12-31"
    description: "三年长期回测"

# --- 回测指标目标 ---
# Emily 建议的关键指标标准
targets:
  annual_return: 0.15        # 年化收益率 ≥15%
  max_drawdown: 0.25         # 最大回撤 ≤25%
  sharpe_ratio: 1.2          # 夏普比率 ≥1.2
  win_rate: 0.55             # 胜率 ≥55%

# --- 回测设置 ---
settings:
  initial_capital: 1000000   # 初始资金 100 万
  commission_rate: 0.0005    # 手续费万分之五
  stamp_duty_rate: 0.001     # 印花税千分之一
  
  # 滑点设置
  slippage: 0.002            # 0.2% 滑点
  
  # 仓位控制
  max_position_pct: 0.08     # 单票最大仓位 8%
  max_stocks: 20             # 最大持仓数量
  
  # 报告输出
  output_dir: "backtest/reports"
  export_trades: true        # 导出交易记录
  export_equity_curve: true  # 导出权益曲线

# --- 策略对比 ---
# 用于多策略对比回测
strategy_comparison:
  enabled: true
  strategies:
    - "macd"
    - "bollinger"
    - "dual_macd"  # 新双 MACD 策略
  metrics:
    - "annual_return"
    - "max_drawdown"
    - "sharpe_ratio"
    - "win_rate"
