<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobQuant Dashboard - 量化交易监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .logo span {
            color: #fff;
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        
        .status-dot.offline {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
        }
        
        .card-content {
            font-size: 14px;
            line-height: 1.6;
        }
        
        .message-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .message-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        
        .message-item.sell {
            border-left-color: #f44336;
        }
        
        .message-item.buy {
            border-left-color: #4caf50;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #888;
        }
        
        .message-content {
            font-size: 13px;
            color: #ddd;
        }
        
        .agent-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 5px;
        }
        
        .agent-badge.boss_bot { background: rgba(255,193,7,0.2); color: #ffc107; }
        .agent-badge.data_bot { background: rgba(76,175,80,0.2); color: #4caf50; }
        .agent-badge.execution_bot { background: rgba(244,67,54,0.2); color: #f44336; }
        .agent-badge.quant_research_bot { background: rgba(156,39,176,0.2); color: #9c27b0; }
        .agent-badge.compliance_bot { background: rgba(33,150,243,0.2); color: #2196f3; }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }
        
        .stat-label {
            font-size: 13px;
            color: #888;
        }
        
        .stat-change {
            font-size: 14px;
            margin-left: 10px;
        }
        
        .stat-change.positive { color: #4caf50; }
        .stat-change.negative { color: #f44336; }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 11px;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #00b8e6;
        }
        
        .btn-danger {
            background: #f44336;
            color: #fff;
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .ws-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .log-terminal {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-line {
            margin-bottom: 5px;
            line-height: 1.4;
        }
        
        .log-time {
            color: #8b949e;
        }
        
        .log-level-info { color: #58a6ff; }
        .log-level-warn { color: #d29922; }
        .log-level-error { color: #f85149; }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Bob<span>Quant</span> Dashboard</div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="ws-dot"></div>
                    <span id="ws-status">连接中...</span>
                </div>
                <div class="status-item">
                    <span>🕐 </span>
                    <span id="current-time">--:--:--</span>
                </div>
                <div class="status-item">
                    <span>📊 </span>
                    <span id="trading-status">休市中</span>
                </div>
                <button class="btn refresh-btn" onclick="refreshAll()">🔄 刷新</button>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📨 消息队列</div>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="mq-pending">0</div>
                    <div class="stat-label">待处理消息</div>
                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                        已投递：<span id="mq-delivered">0</span> | 
                        失败：<span id="mq-failed">0</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🤖 Agent 状态</div>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="agent-count">7</div>
                    <div class="stat-label">在线 Agent</div>
                    <div style="margin-top: 10px; font-size: 12px; color: #888;" id="agent-list">
                        <!-- Agent 列表 -->
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-title">💼 持仓盈亏</div>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="total-pnl">¥0</div>
                    <div class="stat-label">总盈亏</div>
                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                        持仓市值：<span id="market-value">¥0</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-title">⚡ 系统状态</div>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="event-count">0</div>
                    <div class="stat-label">今日事件</div>
                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                        WebSocket 客户端：<span id="ws-clients">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 选项卡 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('messages')">💬 消息流</div>
            <div class="tab" onclick="switchTab('positions')">💼 持仓</div>
            <div class="tab" onclick="switchTab('orders')">📋 订单</div>
            <div class="tab" onclick="switchTab('logs')">📝 日志</div>
        </div>
        
        <!-- 消息流 -->
        <div id="tab-messages" class="card">
            <div class="card-header">
                <div class="card-title">💬 Agent 通信消息</div>
                <button class="btn refresh-btn" onclick="loadMessages()">刷新</button>
            </div>
            <div class="message-list" id="message-list">
                <!-- 消息列表 -->
            </div>
        </div>
        
        <!-- 持仓 -->
        <div id="tab-positions" class="card" style="display: none;">
            <div class="card-header">
                <div class="card-title">💼 当前持仓</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>股票代码</th>
                            <th>股票名称</th>
                            <th>持仓数量</th>
                            <th>可用数量</th>
                            <th>成本价</th>
                            <th>当前价</th>
                            <th>市值</th>
                            <th>盈亏</th>
                            <th>盈亏率</th>
                        </tr>
                    </thead>
                    <tbody id="position-table">
                        <!-- 持仓数据 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 订单 -->
        <div id="tab-orders" class="card" style="display: none;">
            <div class="card-header">
                <div class="card-title">📋 订单记录</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>股票代码</th>
                            <th>操作</th>
                            <th>价格</th>
                            <th>数量</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>成交时间</th>
                        </tr>
                    </thead>
                    <tbody id="order-table">
                        <!-- 订单数据 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 日志 -->
        <div id="tab-logs" class="card" style="display: none;">
            <div class="card-header">
                <div class="card-title">📝 系统日志</div>
                <button class="btn refresh-btn" onclick="loadLogs()">刷新</button>
            </div>
            <div class="log-terminal" id="log-terminal">
                <!-- 日志内容 -->
            </div>
        </div>
    </div>
    
    <!-- WebSocket 状态 -->
    <div class="ws-status">
        <div class="status-dot" id="ws-footer-dot"></div>
        <span id="ws-footer-status">WebSocket</span>
    </div>
    
    <script>
        // WebSocket 连接
        let ws = null;
        let reconnectTimer = null;
        
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket 已连接');
                document.getElementById('ws-dot').classList.remove('offline');
                document.getElementById('ws-status').textContent = '已连接';
                document.getElementById('ws-footer-dot').classList.remove('offline');
                document.getElementById('ws-footer-status').textContent = 'WebSocket 已连接';
            };
            
            ws.onclose = () => {
                console.log('WebSocket 已断开');
                document.getElementById('ws-dot').classList.add('offline');
                document.getElementById('ws-status').textContent = '已断开';
                document.getElementById('ws-footer-dot').classList.add('offline');
                document.getElementById('ws-footer-status').textContent = 'WebSocket 断开';
                
                // 自动重连
                reconnectTimer = setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }
        
        function handleMessage(data) {
            console.log('收到消息:', data);
            
            if (data.type === 'new_message') {
                addMessageToList(data.data);
            } else if (data.type === 'pong') {
                // 心跳响应
            }
        }
        
        // 加载消息列表
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages?limit=50');
                const data = await response.json();
                
                const list = document.getElementById('message-list');
                list.innerHTML = '';
                
                data.messages.forEach(msg => {
                    addMessageToList(msg);
                });
            } catch (error) {
                console.error('加载消息失败:', error);
            }
        }
        
        function addMessageToList(msg) {
            const list = document.getElementById('message-list');
            
            const item = document.createElement('div');
            item.className = `message-item ${msg.content?.action || ''}`;
            item.innerHTML = `
                <div class="message-header">
                    <div>
                        <span class="agent-badge ${msg.from_agent || msg.from}">${msg.from_agent || msg.from}</span>
                        →
                        <span class="agent-badge">${msg.to_agent || msg.to}</span>
                        <span style="margin-left: 10px;">${msg.msg_type || msg.type}</span>
                    </div>
                    <div>${formatTime(msg.timestamp)}</div>
                </div>
                <div class="message-content">${JSON.stringify(msg.content, null, 2)}</div>
            `;
            
            list.insertBefore(item, list.firstChild);
            
            // 限制显示数量
            while (list.children.length > 100) {
                list.removeChild(list.lastChild);
            }
        }
        
        // 加载持仓
        async function loadPositions() {
            try {
                const response = await fetch('/api/positions');
                const data = await response.json();
                
                const tbody = document.getElementById('position-table');
                tbody.innerHTML = '';
                
                data.positions.forEach(pos => {
                    const tr = document.createElement('tr');
                    const pnlClass = pos.profit_loss >= 0 ? 'positive' : 'negative';
                    tr.innerHTML = `
                        <td>${pos.stock_code}</td>
                        <td>${pos.stock_name}</td>
                        <td>${pos.quantity}</td>
                        <td>${pos.available}</td>
                        <td>¥${pos.cost_price.toFixed(2)}</td>
                        <td>¥${pos.current_price.toFixed(2)}</td>
                        <td>¥${pos.market_value.toFixed(2)}</td>
                        <td class="${pnlClass}">¥${pos.profit_loss.toFixed(2)}</td>
                        <td class="${pnlClass}">${pos.profit_loss_pct.toFixed(2)}%</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('total-pnl').textContent = `¥${data.total_profit_loss.toFixed(2)}`;
                document.getElementById('market-value').textContent = `¥${data.total_value.toFixed(2)}`;
            } catch (error) {
                console.error('加载持仓失败:', error);
            }
        }
        
        // 加载订单
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                const data = await response.json();
                
                const tbody = document.getElementById('order-table');
                tbody.innerHTML = '';
                
                data.orders.forEach(order => {
                    const tr = document.createElement('tr');
                    const actionClass = order.action === 'buy' ? 'positive' : 'negative';
                    tr.innerHTML = `
                        <td>${order.order_id}</td>
                        <td>${order.stock_code}</td>
                        <td class="${actionClass}">${order.action.toUpperCase()}</td>
                        <td>¥${order.price.toFixed(2)}</td>
                        <td>${order.quantity}</td>
                        <td>${order.status}</td>
                        <td>${order.create_time}</td>
                        <td>${order.fill_time || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('加载订单失败:', error);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            const terminal = document.getElementById('log-terminal');
            const now = new Date();
            
            const logs = [
                { level: 'INFO', msg: 'Dashboard 已启动' },
                { level: 'INFO', msg: 'WebSocket 服务已启动' },
                { level: 'INFO', msg: '消息队列初始化完成' },
                { level: 'INFO', msg: '交易规则加载完成' },
                { level: 'INFO', msg: 'Agent 注册：boss_bot' },
                { level: 'INFO', msg: 'Agent 注册：data_bot' },
                { level: 'INFO', msg: 'Agent 注册：execution_bot' },
            ];
            
            terminal.innerHTML = '';
            logs.forEach(log => {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.innerHTML = `
                    <span class="log-time">[${now.toISOString().split('T')[0]} ${now.toTimeString().split(' ')[0]}]</span>
                    <span class="log-level-${log.level.toLowerCase()}">[${log.level}]</span>
                    <span>${log.msg}</span>
                `;
                terminal.appendChild(line);
            });
        }
        
        // 加载系统状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('mq-pending').textContent = data.message_queue.pending;
                document.getElementById('mq-delivered').textContent = data.message_queue.delivered;
                document.getElementById('mq-failed').textContent = data.message_queue.failed;
                document.getElementById('event-count').textContent = data.event_bus.history_size;
                document.getElementById('ws-clients').textContent = data.event_bus.websocket_clients;
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }
        
        // 加载 Agent 列表
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                
                document.getElementById('agent-count').textContent = data.agents.length;
                document.getElementById('agent-list').textContent = data.agents.join(', ');
            } catch (error) {
                console.error('加载 Agent 失败:', error);
            }
        }
        
        // 加载交易状态
        async function loadTradingStatus() {
            try {
                const response = await fetch('/api/trading-status');
                const data = await response.json();
                
                const statusEl = document.getElementById('trading-status');
                if (data.can_trade) {
                    statusEl.textContent = `交易中 (${data.reason})`;
                    statusEl.style.color = '#4caf50';
                } else {
                    statusEl.textContent = data.reason;
                    statusEl.style.color = '#888';
                }
            } catch (error) {
                console.error('加载交易状态失败:', error);
            }
        }
        
        // 刷新所有
        function refreshAll() {
            loadMessages();
            loadPositions();
            loadOrders();
            loadStatus();
            loadAgents();
            loadTradingStatus();
        }
        
        // 切换选项卡
        function switchTab(tabName) {
            // 隐藏所有选项卡
            ['messages', 'positions', 'orders', 'logs'].forEach(name => {
                document.getElementById(`tab-${name}`).style.display = 'none';
            });
            
            // 移除所有 active
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的
            document.getElementById(`tab-${tabName}`).style.display = 'block';
            event.target.classList.add('active');
            
            // 加载对应数据
            if (tabName === 'positions') loadPositions();
            if (tabName === 'orders') loadOrders();
            if (tabName === 'logs') loadLogs();
        }
        
        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN');
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            refreshAll();
            updateTime();
            
            setInterval(updateTime, 1000);
            setInterval(loadStatus, 5000);  // 每 5 秒刷新状态
        });
    </script>
</body>
</html>
