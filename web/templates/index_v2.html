<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOB 量化系统 V2.0 - 模拟盘实时监控</title>
    <style>
        /* ===== 基础样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* ===== Header ===== */
        .header {
            background: #5b7cfa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header-info {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .refresh-btn {
            background: #4a6de5;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .refresh-btn:hover { background: #3d5dd1; }

        /* ===== Assets ===== */
        .assets-overview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .asset-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .asset-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .asset-value {
            color: #333;
            font-size: 22px;
            font-weight: bold;
        }

        .asset-value.profit { color: #ff4d4f; }
        .asset-value.loss { color: #52c41a; }

        /* ===== Content Area ===== */
        .content-area {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }

        /* ===== Card ===== */
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-header h2 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        /* ===== Table ===== */
        .table-container { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #fafafa;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }

        td {
            padding: 12px 16px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover { background: #fafafa; }

        .empty-cell {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        /* ===== Position Table ===== */
        .position-table th,
        .position-table td { text-align: right; }

        .position-table th:first-child,
        .position-table td:first-child,
        .position-table th:nth-child(2),
        .position-table td:nth-child(2) { text-align: left; }

        .code-cell { color: #666; font-size: 13px; }
        .name-cell { color: #333; font-weight: 500; }
        .profit-cell { color: #ff4d4f; font-weight: 500; }
        .profit-cell.loss { color: #52c41a; }
        .percent-cell { color: #ff4d4f; font-weight: 500; }
        .percent-cell.loss { color: #52c41a; }

        /* ===== Trade Table ===== */
        .trade-table th,
        .trade-table td { text-align: center; }

        .trade-table th:first-child,
        .trade-table td:first-child,
        .trade-table th:nth-child(2),
        .trade-table td:nth-child(2) { text-align: left; }

        .time-cell { color: #666; font-size: 13px; line-height: 1.4; }
        .action-buy { color: #ff4d4f; font-weight: 500; }
        .action-sell { color: #52c41a; font-weight: 500; }

        /* ===== Mobile Styles ===== */
        .mobile-positions, .mobile-trades { display: none; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { padding: 16px; border-radius: 10px; }
            .header h1 { font-size: 18px; }
            .header-info { font-size: 12px; flex-wrap: wrap; gap: 8px; }
            .assets-overview { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
            .asset-card { padding: 14px; border-radius: 10px; }
            .asset-label { font-size: 12px; margin-bottom: 6px; }
            .asset-value { font-size: 16px; }
            .content-area { grid-template-columns: 1fr; }
            .position-table, .trade-table { display: none; }
            .mobile-positions, .mobile-trades { display: block; padding: 12px; }

            /* Mobile Cards */
            .mobile-position-card {
                background: #ffffff;
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                border: 1px solid #e9ecef;
                border-left: 4px solid #ff4d4f;
            }

            .mobile-position-card.loss { border-left-color: #52c41a; }

            .mobile-position-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
                padding-bottom: 10px;
                border-bottom: 1px solid #f0f0f0;
            }

            .mobile-stock-name { font-size: 16px; font-weight: 700; color: #333; }
            .mobile-stock-code { font-size: 12px; color: #999; margin-top: 2px; }
            .mobile-profit { text-align: right; }
            .mobile-profit-value { font-size: 18px; font-weight: 700; color: #ff4d4f; }
            .mobile-profit-value.loss { color: #52c41a; }
            .mobile-profit-percent { font-size: 12px; color: #999; margin-top: 2px; }

            .mobile-position-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .mobile-stat-item {
                background: #f8f9fa;
                padding: 10px;
                border-radius: 8px;
                text-align: center;
            }

            .mobile-stat-label { font-size: 11px; color: #999; margin-bottom: 4px; display: block; }
            .mobile-stat-value { font-size: 14px; font-weight: 600; color: #333; display: block; }

            /* Mobile Trade Cards */
            .mobile-trade-card {
                background: #ffffff;
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                border: 1px solid #e9ecef;
            }

            .mobile-trade-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }

            .mobile-trade-time { font-size: 12px; color: #999; }
            .mobile-trade-action {
                padding: 3px 10px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 600;
            }

            .mobile-action-buy { background: #ffebee; color: #ff4d4f; }
            .mobile-action-sell { background: #e8f5e9; color: #52c41a; }

            .mobile-trade-body {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .mobile-trade-stock { font-size: 15px; font-weight: 600; color: #333; }
            .mobile-trade-details { text-align: right; }
            .mobile-trade-shares { font-size: 13px; color: #666; }
            .mobile-trade-price { font-size: 12px; color: #999; margin-top: 2px; }
            .mobile-trade-amount { font-size: 15px; font-weight: 700; color: #5b7cfa; margin-top: 2px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 BOB 量化系统 V2.0 - 模拟盘实时监控</h1>
            <div class="header-info">
                <span id="updateTime">最后更新：--</span>
                <button class="refresh-btn" onclick="BobQuantApp.refresh()">🔄 刷新</button>
            </div>
        </div>

        <!-- Assets -->
        <div class="assets-overview">
            <div class="asset-card">
                <div class="asset-label">💰 总资产</div>
                <div class="asset-value" id="totalAssets">--</div>
            </div>
            <div class="asset-card">
                <div class="asset-label">📈 证券市值</div>
                <div class="asset-value" id="marketValue">--</div>
            </div>
            <div class="asset-card">
                <div class="asset-label">💵 可用现金</div>
                <div class="asset-value" id="cash">--</div>
            </div>
            <div class="asset-card">
                <div class="asset-label">📊 持仓盈亏</div>
                <div class="asset-value" id="positionProfit">--</div>
            </div>
            <div class="asset-card">
                <div class="asset-label">📉 当日盈亏</div>
                <div class="asset-value" id="todayProfit">--</div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Positions -->
            <div class="card">
                <div class="card-header">
                    <h2>📋 持仓明细</h2>
                </div>
                <div class="table-container">
                    <table class="position-table">
                        <thead>
                            <tr>
                                <th>代码</th>
                                <th>名称</th>
                                <th>持仓</th>
                                <th>成本价</th>
                                <th>当前价</th>
                                <th>市值</th>
                                <th>盈亏</th>
                                <th>盈亏%</th>
                            </tr>
                        </thead>
                        <tbody id="positionsContent">
                            <tr><td colspan="8" class="empty-cell">加载中...</td></tr>
                        </tbody>
                    </table>
                    <div class="mobile-positions" id="mobilePositionsContent">
                        <div class="empty-cell">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Trades -->
            <div class="card">
                <div class="card-header">
                    <h2>📝 交易记录</h2>
                </div>
                <div class="table-container">
                    <table class="trade-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>股票</th>
                                <th>操作</th>
                                <th>数量</th>
                                <th>价格</th>
                                <th>金额</th>
                            </tr>
                        </thead>
                        <tbody id="tradesContent">
                            <tr><td colspan="6" class="empty-cell">加载中...</td></tr>
                        </tbody>
                    </table>
                    <div class="mobile-trades" id="mobileTradesContent">
                        <div class="empty-cell">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/api_client.js"></script>
    <script src="/static/ui_renderer.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
